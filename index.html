<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ตรวจสอบเงินเดือน</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: #f5f7fa; min-height: 100vh; }

    .header {
      background: linear-gradient(135deg, #00B900 0%, #00a000 100%);
      color: white; padding: 20px 20px 28px; text-align: center;
    }
    .header h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .header p { font-size: 13px; opacity: 0.85; }

    .card {
      background: white; border-radius: 16px;
      margin: -14px 16px 16px; padding: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }

    .month-section { margin-bottom: 16px; }
    .month-label { font-size: 13px; color: #666; margin-bottom: 8px; display: block; }
    .month-selector { display: flex; align-items: center; gap: 10px; }

    .month-nav {
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid #00B900; background: white; color: #00B900;
      font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .month-nav:active { background: #00B900; color: white; }

    .month-display {
      flex: 1; text-align: center; background: #f0faf0;
      border: 1.5px solid #00B900; border-radius: 10px;
      padding: 8px 12px; font-size: 16px; font-weight: 600;
      color: #007a00; cursor: pointer;
    }

    .month-picker-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100; align-items: flex-end;
    }
    .month-picker-overlay.open { display: flex; }

    .month-picker-sheet {
      background: white; width: 100%; border-radius: 20px 20px 0 0;
      padding: 20px; max-height: 85vh; overflow-y: auto;
    }
    .sheet-header {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 16px;
    }
    .sheet-title { font-size: 16px; font-weight: 700; color: #333; }
    .sheet-close {
      width: 32px; height: 32px; border-radius: 50%;
      border: none; background: #eee; font-size: 18px; cursor: pointer;
    }

    .year-nav {
      display: flex; align-items: center;
      justify-content: center; gap: 16px; margin-bottom: 16px;
    }
    .year-btn {
      width: 32px; height: 32px; border-radius: 50%;
      border: 1.5px solid #ccc; background: white;
      font-size: 16px; cursor: pointer;
    }
    .year-display { font-size: 18px; font-weight: 700; color: #333; }

    .month-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    .month-btn {
      padding: 12px 6px; border-radius: 10px; border: 1.5px solid #eee;
      background: white; font-size: 14px; font-family: 'Sarabun', sans-serif;
      cursor: pointer; transition: all 0.15s; color: #333;
    }
    .month-btn:active { transform: scale(0.95); }
    .month-btn.selected { background: #00B900; color: white; border-color: #00B900; font-weight: 700; }
    .month-btn.future { opacity: 0.35; pointer-events: none; }

    .btn-primary {
      width: 100%; padding: 13px; background: #00B900; color: white;
      border: none; border-radius: 12px; font-size: 16px;
      font-family: 'Sarabun', sans-serif; font-weight: 700;
      cursor: pointer; transition: background 0.15s; margin-bottom: 10px;
    }
    .btn-primary:active { background: #009000; }
    .btn-primary:disabled { background: #aaa; cursor: not-allowed; }

    .btn-request {
      width: 100%; padding: 13px; background: white; color: #e55;
      border: 1.5px solid #e55; border-radius: 12px; font-size: 15px;
      font-family: 'Sarabun', sans-serif; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-request:active { background: #fff0f0; }

    #status {
      text-align: center; color: #888; font-size: 14px;
      padding: 8px 0; min-height: 24px;
    }

    .result-card {
      background: white; border-radius: 16px;
      margin: 0 16px 16px; overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .result-title {
      background: #f8f8f8; border-bottom: 1px solid #eee;
      padding: 12px 16px; font-size: 13px; color: #666; font-weight: 600;
    }

    table { width: 100%; border-collapse: collapse; }
    tr:not(:last-child) td { border-bottom: 1px solid #f0f0f0; }
    td { padding: 11px 16px; font-size: 14px; color: #333; }
    td:first-child { color: #666; width: 45%; }
    td:last-child { font-weight: 600; text-align: right; }

    .error-box {
      background: #fff5f5; border: 1px solid #fcc;
      border-radius: 12px; padding: 14px 16px;
      color: #c00; font-size: 14px; text-align: center;
    }

    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #333; color: white; padding: 12px 24px;
      border-radius: 24px; font-size: 14px;
      transition: transform 0.3s ease; z-index: 999; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div class="header">
  <h1>💰 สลิปเงินเดือน</h1>
  <p>ตรวจสอบข้อมูลเงินเดือนของคุณ</p>
</div>

<div class="card">
  <div class="month-section">
    <span class="month-label">เลือกเดือน (พ.ศ.)</span>
    <div class="month-selector">
      <button class="month-nav" onclick="shiftMonth(-1)">‹</button>
      <div class="month-display" onclick="openPicker()">
        <span id="monthDisplayText">กำลังโหลด...</span>
      </div>
      <button class="month-nav" onclick="shiftMonth(1)">›</button>
    </div>
  </div>
  <button class="btn-primary" id="loadBtn" onclick="loadSalary()" disabled>ดูข้อมูลเงินเดือน</button>
  <button class="btn-request" onclick="requestCorrection()">✏️ แจ้งขอแก้ไขข้อมูล</button>
  <div id="status"></div>
</div>

<div id="result"></div>

<div class="month-picker-overlay" id="pickerOverlay" onclick="maybeClose(event)">
  <div class="month-picker-sheet">
    <div class="sheet-header">
      <span class="sheet-title">เลือกเดือน</span>
      <button class="sheet-close" onclick="closePicker()">×</button>
    </div>
    <div class="year-nav">
      <button class="year-btn" onclick="shiftPickerYear(-1)">‹</button>
      <span class="year-display" id="pickerYearDisplay"></span>
      <button class="year-btn" onclick="shiftPickerYear(1)">›</button>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const LIFF_ID = "2009956605-OKD67Yoz";
  const API_URL = "https://script.google.com/macros/s/AKfycbwjD8VpA0Q_xT7j0rUGkVVs1DlIcuVGp-FfutIm9ITs3f2i_5cUecctBO6eK62r2wJ_Lw/exec";

  const THAI_MONTHS = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน",
                       "กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];

  let lineUserId = null;
  let lineDisplayName = "";
  let selectedYear, selectedMonth, pickerYear;

  const now = new Date();
  selectedYear = now.getFullYear();
  selectedMonth = now.getMonth() + 1;

  function adToBE(y) { return y + 543; }

  function updateMonthDisplay() {
    document.getElementById("monthDisplayText").textContent =
      THAI_MONTHS[selectedMonth - 1] + " " + adToBE(selectedYear);
  }

  function shiftMonth(dir) {
    selectedMonth += dir;
    if (selectedMonth > 12) { selectedMonth = 1; selectedYear++; }
    if (selectedMonth < 1)  { selectedMonth = 12; selectedYear--; }
    updateMonthDisplay();
  }

  function openPicker() {
    pickerYear = selectedYear;
    renderPickerYear();
    document.getElementById("pickerOverlay").classList.add("open");
  }
  function closePicker() {
    document.getElementById("pickerOverlay").classList.remove("open");
  }
  function maybeClose(e) {
    if (e.target === document.getElementById("pickerOverlay")) closePicker();
  }
  function shiftPickerYear(dir) {
    pickerYear += dir;
    renderPickerYear();
  }
  function renderPickerYear() {
    document.getElementById("pickerYearDisplay").textContent = "พ.ศ. " + adToBE(pickerYear);
    const grid = document.getElementById("monthGrid");
    grid.innerHTML = "";
    for (let m = 1; m <= 12; m++) {
      const btn = document.createElement("button");
      btn.className = "month-btn";
      btn.textContent = THAI_MONTHS[m - 1];
      if (pickerYear > now.getFullYear() ||
          (pickerYear === now.getFullYear() && m > now.getMonth() + 1)) {
        btn.classList.add("future");
      }
      if (pickerYear === selectedYear && m === selectedMonth) {
        btn.classList.add("selected");
      }
      btn.onclick = () => {
        selectedYear = pickerYear;
        selectedMonth = m;
        updateMonthDisplay();
        closePicker();
      };
      grid.appendChild(btn);
    }
  }

  function getApiMonth() {
    return selectedYear + "-" + String(selectedMonth).padStart(2, "0");
  }

  async function init() {
    await liff.init({ liffId: LIFF_ID });
    if (!liff.isLoggedIn()) { liff.login(); return; }
    const profile = await liff.getProfile();
    lineUserId = profile.userId;
    lineDisplayName = profile.displayName || "";
    document.getElementById("loadBtn").disabled = false;
    updateMonthDisplay();
  }

async function loadSalary() {
  if (!lineUserId) return;
  document.getElementById("status").textContent = "⏳ กำลังโหลดข้อมูล...";
  document.getElementById("result").innerHTML = "";

  try {
    const url = `${API_URL}?lineId=${encodeURIComponent(lineUserId)}&month=${getApiMonth()}`;
    const res = await fetch(url, {
      redirect: "follow",
      method: "GET",
    });

    const text = await res.text(); // อ่านเป็น text ก่อน
    const json = JSON.parse(text); // แล้วค่อย parse

    document.getElementById("status").textContent = "";

    if (json.error) {
      document.getElementById("result").innerHTML =
        `<div style="margin:0 16px"><div class="error-box">⚠️ ${json.error}</div></div>`;
      return;
    }

    const data = json.data;
    if (!data || typeof data !== "object" || Object.keys(data).length === 0) {
      document.getElementById("result").innerHTML =
        `<div style="margin:0 16px"><div class="error-box">ไม่พบข้อมูลเดือนนี้</div></div>`;
      return;
    }

    // กรองแถวที่ไม่มีข้อมูลออก และข้ามแถว header
    let rows = "";
    Object.entries(data).forEach(([k, v]) => {
      if (!k.trim() || k === "รายการ") return; // ข้าม header row
      if (v === "" || v === null || v === undefined) return; // ข้ามแถวว่าง
      rows += `<tr><td>${k}</td><td>${Number(v) === v ? v.toLocaleString('th-TH') : v}</td></tr>`;
    });

    document.getElementById("result").innerHTML = `
      <div class="result-card">
        <div class="result-title">📋 ข้อมูลเงินเดือน — ${THAI_MONTHS[selectedMonth-1]} ${adToBE(selectedYear)}</div>
        <table>${rows}</table>
      </div>`;

  } catch (e) {
    document.getElementById("status").textContent = "";
    document.getElementById("result").innerHTML =
      `<div style="margin:0 16px"><div class="error-box">⚠️ ข้อผิดพลาด: ${e.message}</div></div>`;
  }
}

  async function requestCorrection() {
    if (!lineUserId) { showToast("กรุณารอสักครู่..."); return; }

    const monthText = THAI_MONTHS[selectedMonth - 1] + " " + adToBE(selectedYear);
    const msg = `📝 แจ้งขอแก้ไขข้อมูลเงินเดือน\n👤 ชื่อ: ${lineDisplayName}\n🆔 Line ID: ${lineUserId}\n📅 เดือน: ${monthText}\n\nกรุณาตรวจสอบและดำเนินการแก้ไข`;

    try {
      const res = await fetch(`${API_URL}?action=notify&msg=${encodeURIComponent(msg)}`);
      const json = await res.json();
      if (json.notifyOk) {
        showToast("✅ ส่งคำขอแก้ไขแล้ว รอการติดต่อกลับนะครับ");
      } else {
        showToast("⚠️ ส่งไม่สำเร็จ กรุณาติดต่อ HR โดยตรง");
      }
    } catch(e) {
      showToast("⚠️ ส่งไม่สำเร็จ กรุณาติดต่อ HR โดยตรง");
    }
  }

  function showToast(msg) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 3500);
  }

  init();
</script>
</body>
</html>
